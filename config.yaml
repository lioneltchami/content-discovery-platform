# ============================================================
# Content Discovery Platform — Configuration
# ============================================================
# This platform scrapes from TRUSTED YouTube channels that have
# legal licensing agreements for their content. No random search.
# ============================================================

site:
  name: "ContentHub"
  tagline: "Discover free movies from trusted sources"
  description: "Curated free movies from verified YouTube channels. Action, drama, comedy, horror, sci-fi, classics, documentaries, and Asian cinema."
  theme_color: "#7c3aed"
  accent_color: "#ec4899"
  background_color: "#0a0a1a"
  logo_emoji: "🎬"
  footer_text: ""
  github_repo: "https://github.com/lioneltchami/content-discovery-platform"
  content_label: "movie"
  content_label_plural: "movies"

scraper:
  results_per_category: 30
  schedule_cron: "0 */6 * * *"
  output_dir: "movies"
  default_sources:
    - youtube
  quality:
    min_resolution: 480

# ── Trusted YouTube Channels ──
# Instead of random YouTube search (which returns fakes/AI slop),
# we scrape from verified channels with legal licensing.
trusted_channels:
  - name: "Movie Central"
    url: "https://www.youtube.com/@moviecentral"
    tags: [action, comedy, drama, horror, scifi, western]

  - name: "FilmRise Movies"
    url: "https://www.youtube.com/@filmrisemovies"
    tags: [action, thriller, drama]

  - name: "PopcornFlix"
    url: "https://www.youtube.com/@Popcornflix"
    tags: [action, comedy, drama, horror, thriller]

  - name: "Free Movies"
    url: "https://www.youtube.com/@FreeMovies"
    tags: [drama, comedy, documentary, indie]

  - name: "PizzaFlix"
    url: "https://www.youtube.com/@PizzaFlix"
    tags: [classic, noir, western]

  - name: "Shout Studios"
    url: "https://www.youtube.com/@ShoutStudios"
    tags: [action, classic, comedy]

  - name: "Watch Movies Now"
    url: "https://www.youtube.com/@WatchMoviesNow"
    tags: [horror, scifi, thriller]

  - name: "Horror Central"
    url: "https://www.youtube.com/@HorrorCentral"
    tags: [horror, thriller]

  - name: "Timeless Classic Movies"
    url: "https://www.youtube.com/@TimelessClassicMovies"
    tags: [classic, drama, noir]

  - name: "DUST"
    url: "https://www.youtube.com/@watchdust"
    tags: [scifi]

  - name: "Free Documentary"
    url: "https://www.youtube.com/@FreeDocumentary"
    tags: [documentary]

  - name: "Korean Classic Film"
    url: "https://www.youtube.com/@KoreanFilm"
    tags: [asian, classic, drama]

  - name: "Wu Tang Collection"
    url: "https://www.youtube.com/@WuTangCollection"
    tags: [asian, action, martial_arts]

  - name: "The Midnight Screening"
    url: "https://www.youtube.com/@TheMidnightScreening"
    tags: [action, thriller, scifi]

# ── Categories ──
# These are the filter buttons on the website.
# Videos are auto-categorized based on channel tags above.
categories:
  action:
    icon: "💥"
    display_name: "Action"

  comedy:
    icon: "😂"
    display_name: "Comedy"

  drama:
    icon: "🎭"
    display_name: "Drama"

  horror:
    icon: "👻"
    display_name: "Horror"

  thriller:
    icon: "🔪"
    display_name: "Thriller"

  scifi:
    icon: "🚀"
    display_name: "Sci-Fi"

  classic:
    icon: "🎞️"
    display_name: "Classics"

  documentary:
    icon: "🌍"
    display_name: "Documentary"

  asian:
    icon: "🏯"
    display_name: "Asian Cinema"

  western:
    icon: "🤠"
    display_name: "Western"

# ── Sponsorship ──
sponsorship:
  enabled: true
  github_sponsors: ""
  buy_me_a_coffee: ""
  ko_fi: ""
  custom_url: ""
  message: "If you find this useful, consider supporting the project!"
