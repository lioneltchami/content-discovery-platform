# ============================================================
# Content Discovery Platform — Configuration
# ============================================================
# Edit this file to define your platform's content and branding.
# See examples/ for ready-made configs (NollyHub, AI Hub, GospelStream).
# ============================================================

# ── Site Identity ──
site:
  name: "ContentHub"
  tagline: "Discover free videos on YouTube, curated for you"
  description: "A config-driven content discovery platform. Define your categories, and the pipeline handles the rest."
  theme_color: "#7c3aed"
  accent_color: "#ec4899"
  background_color: "#0a0a1a"
  logo_emoji: "🎬"
  footer_text: ""
  github_repo: "https://github.com/lioneltchami/content-discovery-platform"
  content_label: "video"
  content_label_plural: "videos"

# ── Scraper Settings ──
scraper:
  results_per_category: 15
  schedule_cron: "0 */6 * * *"
  output_dir: "movies"
  default_sources:
    - youtube
  quality:
    min_resolution: 480

# ── Content Categories ──
# These match the existing scraped data.
# Replace with your own categories when you run the scraper.
categories:
  hindi:
    query: "full movie hindi"
    type: movie
    min_duration: 2400
    icon: "🎬"
    sources: [youtube, dailymotion]

  english:
    query: "full movie english"
    type: movie
    min_duration: 2400
    icon: "🌍"
    sources: [youtube, dailymotion]

  tamil:
    query: "full movie tamil"
    type: movie
    min_duration: 2400
    icon: "⭐"
    sources: [youtube, dailymotion]

  telugu:
    query: "full movie telugu"
    type: movie
    min_duration: 2400
    icon: "🎭"
    sources: [youtube, dailymotion]

  kannada:
    query: "full movie kannada"
    type: movie
    min_duration: 2400
    icon: "🎥"
    sources: [youtube, dailymotion]

  marathi:
    query: "full movie marathi"
    type: movie
    min_duration: 2400
    icon: "📜"
    sources: [youtube, dailymotion]

  comedy:
    query: "comedy videos"
    type: show
    min_duration: 600
    icon: "😂"
    sources: [youtube]

  taarak_mehta:
    query: "taarak mehta ka ooltah chashmah"
    type: show
    min_duration: 600
    icon: "📺"
    sources: [youtube]

  yam_hain_hum:
    query: "yam hain hum"
    type: show
    min_duration: 600
    icon: "👨‍👩‍👧"
    sources: [youtube]

  cartoons:
    query: "cartoon full movie for kids"
    type: cartoon
    min_duration: 600
    icon: "🧸"
    sources: [youtube]

# ── Sponsorship ──
sponsorship:
  enabled: true
  github_sponsors: ""
  buy_me_a_coffee: ""
  ko_fi: ""
  custom_url: ""
  message: "If you find this useful, consider supporting the project!"
