# ============================================================
# Content Discovery Platform — Configuration
# ============================================================
# This file defines everything about your content platform:
# what to scrape, how to categorize it, and how the site looks.
#
# To create your own platform, fork this repo and edit this file.
# See examples/ for ready-made configs (NollyHub, AI Hub, GospelStream).
# ============================================================

# ── Site Identity ──
site:
  name: "ContentHub"
  tagline: "Discover free videos on YouTube, curated for you"
  description: "A config-driven content discovery platform. Define your categories, and the pipeline handles the rest."
  theme_color: "#7c3aed"
  accent_color: "#ec4899"
  background_color: "#0a0a1a"
  logo_emoji: "🎬"
  footer_text: "A free, open-source content discovery platform powered by YouTube."
  github_repo: "https://github.com/lioneltchami/content-discovery-platform"
  content_label: "video"
  content_label_plural: "videos"

# ── Scraper Settings ──
scraper:
  results_per_category: 15
  schedule_cron: "0 */6 * * *"
  output_dir: "movies"
  default_sources:
    - youtube
  quality:
    min_resolution: 480    # Minimum video height in pixels (filters low-quality uploads)

# ── Content Categories ──
# Define your categories below. Each one becomes a YouTube search
# and a filter button on the website.
#
# Fields:
#   query:        YouTube search string
#   type:         movie | show | cartoon | music | tutorial | sermon | news
#   min_duration: Minimum video duration in seconds
#   icon:         Emoji for the filter button
#
# ── EXAMPLE: General entertainment (replace with your niche!) ──
categories:
  action_movies:
    query: "full action movie free"
    type: movie
    min_duration: 2400
    icon: "💥"
    sources:
      - youtube
      - dailymotion

  comedy_movies:
    query: "full comedy movie free"
    type: movie
    min_duration: 2400
    icon: "😂"
    sources:
      - youtube
      - dailymotion

  drama_movies:
    query: "full drama movie free"
    type: movie
    min_duration: 2400
    icon: "🎭"
    sources:
      - youtube
      - dailymotion

  documentaries:
    query: "full documentary free"
    type: movie
    min_duration: 1800
    icon: "🌍"
    sources:
      - youtube
      - dailymotion

  thriller_movies:
    query: "full thriller movie free"
    type: movie
    min_duration: 2400
    icon: "🔪"
    sources:
      - youtube
      - dailymotion

  scifi_movies:
    query: "full sci-fi movie free"
    type: movie
    min_duration: 2400
    icon: "🚀"
    sources:
      - youtube
      - dailymotion

  classic_movies:
    query: "classic movie full free"
    type: movie
    min_duration: 2400
    icon: "🎞️"
    sources:
      - youtube
      - dailymotion

  animated_movies:
    query: "full animated movie free"
    type: movie
    min_duration: 2400
    icon: "🧸"
    sources:
      - youtube
      - dailymotion

# ── Subcategories (optional) ──
# Use this for nested content like TV show episodes, podcast series, etc.
# Each entry gets its own subfolder: {output_dir}/cartoons/{name}/{name}.json
# Remove this section entirely if you don't need subcategories.
#
# cartoon_shows:
#   show_name:
#     query: "show name full episodes"
#     icon: "🎬"
#     display_name: "Show Name"

# ── Sponsorship ──
sponsorship:
  enabled: true
  github_sponsors: ""
  buy_me_a_coffee: ""
  ko_fi: ""
  custom_url: ""
  message: "If you find this useful, consider supporting the project!"
