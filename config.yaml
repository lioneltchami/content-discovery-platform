# ============================================================
# Content Discovery Platform — Configuration
# ============================================================
# Edit this file to define your platform's content and branding.
# See examples/ for ready-made configs (NollyHub, AI Hub, GospelStream).
# ============================================================

# ── Site Identity ──
site:
  name: "ContentHub"
  tagline: "Discover free videos on YouTube, curated for you"
  description: "A config-driven content discovery platform. Define your categories, and the pipeline handles the rest."
  theme_color: "#7c3aed"
  accent_color: "#ec4899"
  background_color: "#0a0a1a"
  logo_emoji: "🎬"
  footer_text: ""
  github_repo: "https://github.com/lioneltchami/content-discovery-platform"
  content_label: "video"
  content_label_plural: "videos"

# ── Scraper Settings ──
scraper:
  results_per_category: 15
  schedule_cron: "0 */6 * * *"
  output_dir: "movies"
  default_sources:
    - youtube
  quality:
    min_resolution: 480

# ── Content Categories ──
categories:
  action:
    query: "full action movie free"
    type: movie
    min_duration: 2400
    icon: "💥"
    sources: [youtube, dailymotion]

  comedy:
    query: "full comedy movie free"
    type: movie
    min_duration: 2400
    icon: "😂"
    sources: [youtube, dailymotion]

  drama:
    query: "full drama movie free"
    type: movie
    min_duration: 2400
    icon: "🎭"
    sources: [youtube, dailymotion]

  documentary:
    query: "full documentary free"
    type: movie
    min_duration: 1800
    icon: "🌍"
    sources: [youtube, dailymotion]

  thriller:
    query: "full thriller movie free"
    type: movie
    min_duration: 2400
    icon: "🔪"
    sources: [youtube, dailymotion]

  scifi:
    query: "full sci-fi movie free"
    type: movie
    min_duration: 2400
    icon: "🚀"
    sources: [youtube, dailymotion]

  classic:
    query: "classic movie full free"
    type: movie
    min_duration: 2400
    icon: "🎞️"
    sources: [youtube, dailymotion]

  animated:
    query: "full animated movie free"
    type: movie
    min_duration: 2400
    icon: "🧸"
    sources: [youtube, dailymotion]

# ── Sponsorship ──
sponsorship:
  enabled: true
  github_sponsors: ""
  buy_me_a_coffee: ""
  ko_fi: ""
  custom_url: ""
  message: "If you find this useful, consider supporting the project!"
