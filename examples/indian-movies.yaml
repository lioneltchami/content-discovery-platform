# ============================================================
# Example: Indian Movies & Cartoons Platform
# ============================================================
# Copy this to config.yaml to create a Bollywood/regional Indian
# movie discovery platform with Hindi cartoon shows.
# ============================================================

site:
  name: "Movies Hub"
  tagline: "Free full-length movies, comedy shows & cartoons on YouTube"
  description: "Discover free Bollywood, regional Indian movies and Hindi cartoons on YouTube. Updated every 6 hours."
  theme_color: "#7c3aed"
  accent_color: "#ec4899"
  background_color: "#0a0a1a"
  logo_emoji: "🎬"
  footer_text: "A free, open-source video discovery platform powered by YouTube."
  github_repo: ""
  content_label: "movie"
  content_label_plural: "movies"

scraper:
  results_per_category: 15
  schedule_cron: "0 */6 * * *"
  output_dir: "movies"
  default_sources: [youtube]
  quality:
    min_resolution: 480

categories:
  hindi:
    query: "full movie hindi"
    type: movie
    min_duration: 2400
    icon: "🇮🇳"
    sources: [youtube, dailymotion]
  marathi:
    query: "full movie marathi"
    type: movie
    min_duration: 2400
    icon: "📜"
    sources: [youtube, dailymotion]
  english:
    query: "full movie english"
    type: movie
    min_duration: 2400
    icon: "🎬"
    sources: [youtube, dailymotion]
  tamil:
    query: "full movie tamil"
    type: movie
    min_duration: 2400
    icon: "⭐"
    sources: [youtube, dailymotion]
  telugu:
    query: "full movie telugu"
    type: movie
    min_duration: 2400
    icon: "🎭"
    sources: [youtube, dailymotion]
  kannada:
    query: "full movie kannada"
    type: movie
    min_duration: 2400
    icon: "🎥"
    sources: [youtube, dailymotion]
  comedy:
    query: "hindi comedy videos"
    type: show
    min_duration: 600
    icon: "😂"
  taarak_mehta:
    query: "taarak mehta ka ooltah chashmah"
    type: show
    min_duration: 600
    icon: "📺"
  yam_hain_hum:
    query: "yam hain hum"
    type: show
    min_duration: 600
    icon: "👨‍👩‍👧"
  cartoons:
    query: "cartoon full movie for kids"
    type: cartoon
    min_duration: 600
    icon: "🧸"

