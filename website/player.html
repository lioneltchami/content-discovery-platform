<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Now Playing</title>
    <meta name="description" content="Watch free content powered by YouTube." />
    <meta property="og:title" content="Now Playing" />
    <meta property="og:description" content="Watch free content powered by YouTube." />
    <meta property="og:type" content="video.movie" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:image" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <link rel="preconnect" href="https://www.dailymotion.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="stylesheet" href="style.css" fetchpriority="high" />
    <script>
      (function() {
        var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
    <style>
        /* ── Player Page Specific Styles ── */
        .player-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            transition: color var(--transition);
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            padding: 0;
        }

        .back-btn:hover {
            color: var(--accent-2);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 48px rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            gap: 1rem;
            z-index: 2;
        }

        .video-loading.hidden {
            display: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-2);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Video Info */
        .video-info {
            margin-top: 1.5rem;
        }

        .video-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .video-meta-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .meta-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .meta-category {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            color: #fff;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Action Buttons */
        .video-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.65rem 1.3rem;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            border: 1px solid var(--border-color);
            background: var(--bg-glass);
            color: var(--text-secondary);
        }

        .action-btn:hover {
            border-color: var(--accent-2);
            color: var(--text-primary);
            background: rgba(168, 85, 247, 0.1);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            border-color: transparent;
            color: #fff;
        }

        .action-btn.primary:hover {
            background: linear-gradient(135deg, #b91c1c, #dc2626);
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Player Controls Bar */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        .ctrl-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--accent-2);
            color: var(--text-primary);
        }

        .ctrl-btn.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--accent-2);
            color: var(--accent-2);
        }

        .ctrl-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Related Movies */
        .related-section {
            margin-top: 3rem;
        }

        .related-section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }

        /* Error State */
        .player-error {
            text-align: center;
            padding: 4rem 2rem;
        }

        .player-error svg {
            width: 72px;
            height: 72px;
            color: var(--accent-3);
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }

        .player-error h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .player-error p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* QR Code Modal */
        .qr-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .qr-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            max-width: 320px;
        }
        .qr-modal-content img {
            border-radius: var(--radius-md);
            margin: 1rem 0;
        }
        .qr-modal-content h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .qr-modal-content p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .player-wrapper {
                padding: 1rem 1rem 2rem;
            }

            .video-title {
                font-size: 1.15rem;
            }

            .video-meta-bar {
                gap: 1rem;
            }

            .video-actions {
                gap: 0.5rem;
            }

            .action-btn {
                padding: 0.5rem 1rem;
                font-size: 0.82rem;
            }

            .related-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }
    </style>
</head>

<body>
    <a href="#playerWrapper" class="skip-link">Skip to content</a>

    <!-- ═══ Navbar ═══ -->
    <nav class="navbar" id="navbar"></nav>

    <!-- ═══ Player ═══ -->
    <main>
    <div class="player-wrapper" id="playerWrapper">

        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Movies
        </button>

        <!-- Video Player -->
        <div class="video-container" id="videoContainer">
            <div class="video-loading" id="videoLoading">
                <div class="spinner"></div>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Loading player...</span>
            </div>
            <!-- iframe injected by JS -->
        </div>

        <!-- Player Controls -->
        <div class="player-controls" id="playerControls">
            <button class="ctrl-btn" onclick="toggleAutoplay(this)" title="Autoplay next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.5 12l-10 6V6l10 6zM21 6v12" />
                </svg>
                Autoplay
            </button>
            <button class="ctrl-btn" onclick="toggleLoop()" id="loopBtn" title="Loop video">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 1l4 4-4 4" />
                    <path d="M3 11V9a4 4 0 014-4h14" />
                    <path d="M7 23l-4-4 4-4" />
                    <path d="M21 13v2a4 4 0 01-4 4H3" />
                </svg>
                Loop
            </button>
            <button class="ctrl-btn" onclick="toggleTheater()" id="theaterBtn" title="Theater mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                </svg>
                Theater
            </button>
            <button class="ctrl-btn" onclick="openPiP()" title="Picture-in-Picture">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <rect x="11" y="10" width="9" height="6" rx="1" />
                </svg>
                PiP
            </button>
            <button class="ctrl-btn" onclick="goFullscreen()" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                Fullscreen
            </button>
        </div>

        <!-- Video Info -->
        <div class="video-info" id="videoInfo">
            <h1 class="video-title" id="videoTitle">Loading...</h1>

            <div class="video-meta-bar">
                <span class="meta-category" id="videoCategory">--</span>
                <div class="meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <span id="videoViews">--</span>
                </div>
                <div class="meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span id="videoDuration">--</span>
                </div>
                <div class="meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span id="videoUploader">--</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="video-actions">
                <a class="action-btn primary" id="youtubeLink" href="#" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z" />
                        <path fill="#fff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                    </svg>
                    Watch on YouTube
                </a>
                <button class="action-btn" onclick="shareVideo()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3" />
                        <circle cx="6" cy="12" r="3" />
                        <circle cx="18" cy="19" r="3" />
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                    </svg>
                    Share
                </button>
                <button class="action-btn" onclick="copyLink()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                    </svg>
                    Copy Link
                </button>
                <button class="action-btn" onclick="showQRCode()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="8" height="8" rx="1"/>
                        <rect x="14" y="2" width="8" height="8" rx="1"/>
                        <rect x="2" y="14" width="8" height="8" rx="1"/>
                        <rect x="14" y="14" width="4" height="4"/>
                        <rect x="20" y="14" width="2" height="2"/>
                        <rect x="14" y="20" width="2" height="2"/>
                        <rect x="20" y="20" width="2" height="2"/>
                    </svg>
                    QR Code
                </button>
            </div>
        </div>

        <!-- Related Movies -->
        <div class="related-section" id="relatedSection">
            <h2 id="relatedHeading">🎬 More Videos</h2>
            <div class="related-grid" id="relatedGrid">
                <!-- Populated by JS -->
            </div>
        </div>

    </div>
    </main>

    <!-- ═══ Footer ═══ -->
    <footer class="footer" id="footer"></footer>

    <script src="components.js"></script>
    <script src="player.js"></script>

</body>

</html>
