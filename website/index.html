<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <meta name="description" content="Discover free content on YouTube. Updated daily." />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Open Graph -->
  <meta property="og:title" content="Content Hub" />
  <meta property="og:description" content="Discover free content on YouTube. Updated daily." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://i.ytimg.com/vi/default/hqdefault.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Content Hub" />
  <meta name="twitter:description" content="Discover free content on YouTube. Updated daily." />
  <meta name="color-scheme" content="dark light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="style.css" fetchpriority="high" />
  <script>
    (function() {
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ContentHub",
    "url": "https://example.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://example.com/index.html?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <a href="#moviesGrid" class="skip-link">Skip to content</a>

  <!-- ═══ Navbar ═══ -->
  <nav class="navbar" id="navbar"></nav>

  <main id="main">

  <!-- ═══ Hero Section ═══ -->
  <section class="hero">
    <div class="hero-content">
      <h1><span id="siteName">Loading...</span></h1>
      <p id="siteTagline">Discovering content...</p>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-value" id="totalMovies">--</div>
          <div class="stat-label" id="totalMoviesLabel">Videos</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalCategories">--</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalViews">--</div>
          <div class="stat-label">Total Views</div>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-section">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input type="text" class="search-input" id="searchInput"
            placeholder="Search by title, channel, category..." autocomplete="off" aria-label="Search content" />
          <button class="voice-search-btn" id="voiceSearchBtn" onclick="startVoiceSearch()" aria-label="Voice search" title="Search by voice">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Clear search">✕</button>
        </div>
        <div class="search-result-count" id="searchResultCount" role="status" aria-live="polite"></div>
      </div>

    </div>
  </section>

  <!-- ═══ Category Filters (populated by JS from config) ═══ -->
  <section class="filter-section">
    <div class="filter-bar" id="filterBar"></div>
  </section>

  <!-- ═══ Content Grid ═══ -->
  <section class="movies-section">
    <div class="movies-grid" id="moviesGrid">
      <!-- Cards rendered by script.js -->
    </div>
  </section>

  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="footer" id="footer"></footer>

  <script src="components.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>

</html>
